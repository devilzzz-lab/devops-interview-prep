apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamodb-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dynamodb-app
  template:
    metadata:
      labels:
        app: dynamodb-app
    spec:
      serviceAccountName: dynamodb-app-sa   # <-- this is what links the pod to IRSA
      containers:
        - name: dynamodb-app
          image: <your-ecr-or-dockerhub>/dynamodb-app:v1
          ports:
            - containerPort: 8080
          env:
            - name: DYNAMODB_TABLE
              value: "Customers"
            - name: AWS_REGION
              value: "us-east-1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dynamodb-app
  namespace: default
spec:
  selector:
    app: dynamodb-app
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP