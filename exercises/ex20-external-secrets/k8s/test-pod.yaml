apiVersion: v1
kind: Pod
metadata:
  name: secret-test
spec:
  restartPolicy: Never
  containers:
  - name: test
    image: busybox
    command:
      - sh
      - -c
      - |
        echo "DB_USERNAME=$DB_USERNAME"
        echo "DB_PASSWORD=$DB_PASSWORD"
        echo "JWT_SECRET=$JWT_SECRET"
        sleep 3600
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "100m"
        memory: "128Mi"
    envFrom:
    - secretRef:
        name: app-secret