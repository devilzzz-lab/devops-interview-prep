apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscale-app
  namespace: autoscaling
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoscale-app
  template:
    metadata:
      labels:
        app: autoscale-app
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: autoscale-app
  namespace: autoscaling
spec:
  selector:
    app: autoscale-app
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
